      <stop offset="100%" style="stop-color:#3b3df5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sheen2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
